<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Adjust trim</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --line: #2a313c;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --impact: #f0883e;
    --window: rgba(88,166,255,0.25);
    --window-edge: #58a6ff;
    --weak: #d1242f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--text);
               font: 14px/1.4 -apple-system, system-ui, sans-serif; }
  header {
    background: var(--panel); border-bottom: 1px solid var(--line);
    padding: 10px 16px; display: flex; align-items: center; gap: 16px;
  }
  header a { color: var(--muted); text-decoration: none; }
  header a:hover { color: var(--accent); }
  header h1 { font-size: 14px; font-weight: 600; margin: 0; flex: 1; }
  header .status { color: var(--muted); font-size: 12px; }
  button {
    background: var(--accent); color: #0e1116; font-weight: 600;
    border: 0; border-radius: 6px; padding: 6px 14px; cursor: pointer;
    font-size: 13px;
  }
  button.ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); font-weight: 400; }
  button:disabled { opacity: 0.5; cursor: default; }
  main { padding: 16px; }
  .videos {
    display: grid; gap: 16px;
    grid-template-columns: 1fr 1fr;
    margin-bottom: 24px;
  }
  .video-block { background: var(--panel); border: 1px solid var(--line);
                 border-radius: 8px; padding: 12px; }
  .video-block h2 { font-size: 12px; color: var(--muted); margin: 0 0 8px;
                    text-transform: uppercase; letter-spacing: 0.5px; }
  video { width: 100%; max-height: 60vh; background: #000; border-radius: 4px; }

  .controls { background: var(--panel); border: 1px solid var(--line);
              border-radius: 8px; padding: 16px; }
  .timeline-wrap { position: relative; user-select: none; padding: 24px 0 32px; }
  .timeline {
    position: relative; height: 48px; background: #0a0d12;
    border: 1px solid var(--line); border-radius: 4px;
    cursor: crosshair;
  }
  .window {
    position: absolute; top: 0; bottom: 0;
    background: var(--window);
    border-left: 2px solid var(--window-edge);
    border-right: 2px solid var(--window-edge);
  }
  .handle {
    position: absolute; top: -6px; bottom: -6px;
    width: 14px; background: var(--window-edge);
    border-radius: 3px; cursor: ew-resize;
    box-shadow: 0 0 0 2px rgba(0,0,0,0.4);
  }
  .handle.left { transform: translateX(-50%); }
  .handle.right { transform: translateX(-50%); }
  .impact {
    position: absolute; top: -10px; bottom: -10px;
    width: 3px; background: var(--impact); cursor: ew-resize;
    box-shadow: 0 0 6px var(--impact);
  }
  .playhead {
    position: absolute; top: -4px; bottom: -4px;
    width: 1px; background: #fff; pointer-events: none; opacity: 0.7;
  }
  .ticks {
    position: absolute; left: 0; right: 0; bottom: -22px;
    font-size: 10px; color: var(--muted);
    pointer-events: none;
  }
  .tick { position: absolute; transform: translateX(-50%); }

  .readout {
    display: flex; gap: 24px; align-items: center;
    margin-top: 16px; flex-wrap: wrap;
  }
  .readout label { color: var(--muted); font-size: 12px; }
  .readout .v { font-family: ui-monospace, Menlo, monospace; font-size: 13px;
                color: var(--text); margin-left: 6px; }
  .winctl { display: inline-flex; align-items: center; gap: 6px; }
  .winctl .v { min-width: 38px; text-align: center; margin-left: 0; }
  .step {
    width: 26px; height: 26px; padding: 0; line-height: 1;
    border: 1px solid var(--accent); background: transparent; color: var(--accent);
    border-radius: 6px; cursor: pointer; font-size: 16px;
  }
  .step:hover { background: var(--accent); color: var(--bg); }
  .step:disabled { opacity: .35; cursor: default; }
  .actions { margin-left: auto; display: flex; gap: 8px; }

  .reasons { color: var(--weak); font-size: 12px; margin-top: 8px; }
  .reasons li { margin-left: 16px; }

  .siblings {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .siblings .label {
    color: var(--muted); font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .sib-chip {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 12px;
    padding: 3px 10px; font-size: 12px;
    text-decoration: none; cursor: pointer;
  }
  .sib-chip:hover { border-color: var(--accent); }
  .sib-chip.current { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .sib-chip .ts { font-family: ui-monospace, Menlo, monospace; opacity: 0.7; margin-left: 4px; }
  .split-btn {
    background: transparent; color: var(--accent); border: 1px solid var(--accent);
    border-radius: 6px; padding: 6px 12px; cursor: pointer; font: inherit;
  }
  .split-btn:hover { background: var(--accent); color: var(--bg); }
</style>
</head>
<body>
  <header>
    <a href="/">← back</a>
    <h1 id="title">…</h1>
    <span class="status" id="status"></span>
  </header>
  <main>
    <div class="videos">
      <div class="video-block">
        <h2>Raw — scrub to the strike, then press Space (or click the timeline)</h2>
        <video id="raw" preload="auto" controls playsinline></video>
      </div>
      <div class="video-block">
        <h2>Current trim</h2>
        <video id="trim" autoplay loop muted playsinline></video>
      </div>
    </div>

    <div class="controls">
      <div class="siblings" id="siblings"></div>
      <div class="timeline-wrap">
        <div class="timeline" id="tl" title="Click to place strike here">
          <div class="window" id="win"></div>
          <div class="impact" id="imp"></div>
          <div class="playhead" id="ph"></div>
        </div>
        <div class="ticks" id="ticks"></div>
      </div>
      <div class="readout">
        <span><label>strike</label><span class="v" id="rImpact">—</span></span>
        <span><label>window</label><span class="v" id="rWin">—</span></span>
        <span class="winctl"><label>before</label>
          <button id="preMinus" class="step" title="0.5s less before the strike">−</button>
          <span class="v" id="rPre">—</span>
          <button id="prePlus" class="step" title="0.5s more before the strike">+</button>
        </span>
        <span class="winctl"><label>after</label>
          <button id="postMinus" class="step" title="0.5s less after the strike">−</button>
          <span class="v" id="rPost">—</span>
          <button id="postPlus" class="step" title="0.5s more after the strike">+</button>
        </span>
        <div class="actions">
          <button id="markHere">Set strike at playhead (space)</button>
          <button id="splitHere" class="split-btn"
                  title="Add a NEW shot in this raw video at the current playhead. Stays on this page so you can keep marking more shots.">
            + Add shot at playhead
          </button>
          <button id="rotate" class="ghost"
                  title="Rotate the trim 90° clockwise. Click again to step through 180°, 270°, and back to upright.">
            Rotate ⟳
          </button>
          <button id="save" style="background:#2ea043;">Save</button>
          <button id="next" class="ghost" title="Jump to the next clip that still needs review.">Next →</button>
          <button id="discard" style="background:var(--weak);">Discard</button>
        </div>
      </div>
      <ul class="reasons" id="reasons"></ul>
    </div>
  </main>

<script>
const STEM = decodeURIComponent(location.pathname.split("/").pop());
const $ = (id) => document.getElementById(id);

let META = null;
let ORIGINAL = null;     // snapshot of meta as loaded for "Reset"
let DURATION = 0;        // raw video duration (seconds)
let TL_RECT = null;      // cached on first interaction

const rawV = $("raw");
const trimV = $("trim");

async function load() {
  META = await fetch(`/api/clips/${encodeURIComponent(STEM)}`).then(r => r.json());
  ORIGINAL = JSON.parse(JSON.stringify(META));
  $("title").textContent = META.raw + (META.edited ? "  •  edited" : "");
  rawV.src = `/raw/${encodeURIComponent(META.raw)}`;
  if (META.has_trim) {
    trimV.src = `/trims/${encodeURIComponent(STEM)}.mp4?t=${Date.now()}`;
  }
  rawV.addEventListener("loadedmetadata", onRawReady, { once: true });

  const reasons = $("reasons");
  reasons.innerHTML = "";
  for (const r of (META.reasons || [])) {
    const li = document.createElement("li");
    li.textContent = r; reasons.appendChild(li);
  }

  if (META.render_status && META.render_status !== "done") {
    $("status").textContent = META.render_status;
  }

  updateRotateLabel();
  await renderSiblings();
}

async function renderSiblings() {
  // Show all clips that share this raw (the original + any sub-clips). Lets
  // the user hop between sub-clips of the same multi-shot raw without
  // detouring through the grid.
  const all = await fetch("/api/clips").then(r => r.json());
  const sibs = all.filter(c => c.raw === META.raw);
  const root = $("siblings");
  root.innerHTML = "";
  if (sibs.length <= 1) return;  // only the current clip — no list to show
  const label = document.createElement("span");
  label.className = "label"; label.textContent = `Shots in ${META.raw}:`;
  root.appendChild(label);
  sibs.sort((a, b) => (a.impact_s ?? 0) - (b.impact_s ?? 0));
  for (const s of sibs) {
    const chip = document.createElement("a");
    chip.className = "sib-chip" + (s.stem === STEM ? " current" : "");
    chip.href = `/clip/${encodeURIComponent(s.stem)}`;
    const t = (s.impact_s ?? 0).toFixed(2);
    chip.innerHTML = `${s.stem}<span class="ts">${t}s</span>`;
    root.appendChild(chip);
  }
}

function onRawReady() {
  DURATION = rawV.duration;
  drawTicks();
  layout();
  // Start playhead a touch before the detected strike so the user can hear it.
  rawV.currentTime = Math.max(0, (META.impact_s ?? 0) - 1.0);
  rawV.addEventListener("timeupdate", movePlayhead);
}

function inSec()  { return Math.max(0, (META.impact_s ?? 0) - META.pre); }
function outSec() { return Math.min(DURATION, (META.impact_s ?? 0) + META.post); }
function pctOf(t) { return (t / DURATION) * 100; }
function tlRect() { return TL_RECT ?? (TL_RECT = $("tl").getBoundingClientRect()); }
function timeAtX(x) {
  const r = tlRect();
  return Math.max(0, Math.min(DURATION, ((x - r.left) / r.width) * DURATION));
}

function layout() {
  const inP = pctOf(inSec()), outP = pctOf(outSec()), impP = pctOf(META.impact_s ?? 0);
  $("win").style.left = inP + "%";
  $("win").style.width = (outP - inP) + "%";
  $("imp").style.left = impP + "%";
  $("rImpact").textContent = (META.impact_s ?? 0).toFixed(3) + "s";
  $("rWin").textContent = `${inSec().toFixed(2)} → ${outSec().toFixed(2)}s  (${(META.pre + META.post).toFixed(1)}s)`;
  $("rPre").textContent  = META.pre.toFixed(1) + "s";
  $("rPost").textContent = META.post.toFixed(1) + "s";
  // Disable a stepper once the window already reaches the clip edge.
  $("prePlus").disabled  = META.pre  >= (META.impact_s ?? 0) - 1e-6;
  $("postPlus").disabled = META.post >= DURATION - (META.impact_s ?? 0) - 1e-6;
  $("preMinus").disabled  = META.pre  <= 1e-6;
  $("postMinus").disabled = META.post <= 1e-6;
}

function movePlayhead() {
  $("ph").style.left = pctOf(rawV.currentTime) + "%";
}

function drawTicks() {
  const t = $("ticks");
  t.innerHTML = "";
  const step = DURATION > 30 ? 5 : DURATION > 10 ? 2 : 1;
  for (let s = 0; s <= DURATION; s += step) {
    const el = document.createElement("span");
    el.className = "tick"; el.style.left = pctOf(s) + "%";
    el.textContent = s + "s";
    t.appendChild(el);
  }
}

function clampWindow() {
  // Keep the chosen pre/post but never let the window run past the clip edges.
  META.pre  = Math.max(0, Math.min(META.pre,  META.impact_s));
  META.post = Math.max(0, Math.min(META.post, DURATION - META.impact_s));
}

function setImpact(t) {
  META.impact_s = Math.max(0, Math.min(DURATION, t));
  clampWindow();
  layout();
}

const WIN_STEP = 0.5;  // seconds per nudge
function adjustPre(delta) {
  META.pre = Math.max(0, Math.min(META.impact_s, (META.pre || 0) + delta));
  layout();
}
function adjustPost(delta) {
  META.post = Math.max(0, Math.min(DURATION - META.impact_s, (META.post || 0) + delta));
  layout();
}
$("prePlus").onclick   = () => adjustPre(WIN_STEP);
$("preMinus").onclick  = () => adjustPre(-WIN_STEP);
$("postPlus").onclick  = () => adjustPost(WIN_STEP);
$("postMinus").onclick = () => adjustPost(-WIN_STEP);

$("tl").addEventListener("click", (e) => {
  TL_RECT = $("tl").getBoundingClientRect();
  setImpact(timeAtX(e.clientX));
  rawV.currentTime = META.impact_s;
  TL_RECT = null;
});

$("markHere").onclick = () => setImpact(rawV.currentTime);

window.addEventListener("keydown", (e) => {
  if (e.code !== "Space") return;
  // Don't fight the video element's own play/pause when it's focused.
  if (document.activeElement === rawV) return;
  e.preventDefault();
  setImpact(rawV.currentTime);
});

async function gotoNext() {
  // Find the next still-needs-fix clip after this one in the round order.
  // If none remain, head back to the grid.
  const all = await fetch("/api/clips").then(r => r.json());
  const queue = all.filter(c => (c.review || "unreviewed") === "needs_fix" && c.stem !== STEM);
  if (!queue.length) { location.href = "/"; return; }
  // Prefer the next one after the current stem in the round's natural order.
  const idx = all.findIndex(c => c.stem === STEM);
  const after = all.slice(idx + 1).find(c => (c.review || "unreviewed") === "needs_fix");
  const target = after || queue[0];
  location.href = `/clip/${encodeURIComponent(target.stem)}`;
}

$("discard").onclick = async () => {
  if (!confirm(`Discard ${STEM}? Files move to clips/<round>/trash/.`)) return;
  await fetch(`/api/clips/${encodeURIComponent(STEM)}/discard`, { method: "POST" });
  gotoNext();
};

function updateRotateLabel() {
  const cur = META?.rotate || 0;
  $("rotate").textContent = cur === 0 ? "Rotate ⟳" : `Rotated ${cur}° ⟳`;
}

$("rotate").onclick = async () => {
  const cur = META.rotate || 0;
  const next = (cur + 90) % 360;  // 0 → 90 → 180 → 270 → 0
  $("rotate").disabled = true;
  $("status").textContent = "rotating + re-rendering…";
  try {
    const r = await fetch(`/api/clips/${encodeURIComponent(STEM)}/rotate`, {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ rotate: next }),
    });
    if (!r.ok) {
      alert(`Rotate failed: ${r.status} ${await r.text()}`);
      return;
    }
    META = await r.json();
    updateRotateLabel();
    // Bust the trim cache so the rotated render replaces the cached one.
    if (META.has_trim) {
      trimV.src = `/trims/${encodeURIComponent(STEM)}.mp4?t=${Date.now()}`;
    }
  } finally {
    $("rotate").disabled = false;
  }
};

$("splitHere").onclick = async () => {
  const at = rawV.currentTime;
  if (at <= 0 || at >= DURATION) {
    alert("Scrub to the new strike moment first.");
    return;
  }
  $("splitHere").disabled = true;
  try {
    const r = await fetch(`/api/clips/${encodeURIComponent(STEM)}/split`, {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ impact_s: at }),
    });
    if (!r.ok) {
      alert(`Split failed: ${r.status} ${await r.text()}`);
      return;
    }
    // Stay on the current clip — refresh the siblings chip strip so the new
    // sub-clip shows up. The user can keep scrubbing and adding more shots.
    await renderSiblings();
  } finally {
    $("splitHere").disabled = false;
  }
};

$("save").onclick = async () => {
  $("save").disabled = true;
  try {
    // Save the new impact, kick render in background, mark approved.
    await fetch(`/api/clips/${encodeURIComponent(STEM)}`, {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ impact_s: META.impact_s, pre: META.pre, post: META.post }),
    });
    fetch(`/api/clips/${encodeURIComponent(STEM)}/render`, { method: "POST" });
    await fetch(`/api/clips/${encodeURIComponent(STEM)}/review`, {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ review: "approved" }),
    });

    // Also approve every sibling sub-clip on the same raw that's still
    // sitting in unreviewed/needs_fix. Splitting set their impact moments
    // already — saving the parent is the user's "ship all of them" signal,
    // so they shouldn't have to walk through each chip individually.
    const all = await fetch("/api/clips").then(r => r.json());
    const sibs = all.filter(c =>
      c.raw === META.raw &&
      c.stem !== STEM &&
      (c.review || "unreviewed") !== "approved"
    );
    for (const s of sibs) {
      await fetch(`/api/clips/${encodeURIComponent(s.stem)}/review`, {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ review: "approved" }),
      });
    }

    const extra = sibs.length ? ` (+${sibs.length} sibling${sibs.length > 1 ? "s" : ""})` : "";
    $("status").textContent = `saved — re-rendering${extra}`;
    setTimeout(async () => {
      trimV.src = `/trims/${encodeURIComponent(STEM)}.mp4?t=${Date.now()}`;
      $("status").textContent = "approved" + extra;
      await renderSiblings();
    }, 1500);
  } finally {
    $("save").disabled = false;
  }
};

$("next").onclick = () => gotoNext();

window.addEventListener("resize", () => { TL_RECT = null; });
load();
{
  const sw = document.createElement("script");
  sw.src = "/web/status-widget.js";
  document.body.appendChild(sw);
}

// Poll render status — when this clip's queued re-render finishes, swap the
// trim preview to the freshly-rendered file. The render queue can be deep
// (1 worker × 30+ pending), so without this the user sees stale trims even
// after the file on disk has been updated.
let LAST_TRIMMED_AT = null;
let LAST_RENDER_STATUS = null;
setInterval(async () => {
  try {
    const fresh = await fetch(`/api/clips/${encodeURIComponent(STEM)}`).then(r => r.json());
    const trimmedAt = fresh.trimmed_at || null;
    const status = fresh.render_status || null;
    const doneFlip = LAST_RENDER_STATUS && LAST_RENDER_STATUS !== "done" && status === "done";
    const trimChanged = LAST_TRIMMED_AT && trimmedAt && trimmedAt !== LAST_TRIMMED_AT;
    if (doneFlip || trimChanged) {
      trimV.src = `/trims/${encodeURIComponent(STEM)}.mp4?t=${Date.now()}`;
      $("status").textContent = "rendered ✓";
      setTimeout(() => { if ($("status").textContent === "rendered ✓") $("status").textContent = ""; }, 2000);
    } else if (status && status !== "done") {
      $("status").textContent = `rendering — ${status}`;
    }
    LAST_TRIMMED_AT = trimmedAt;
    LAST_RENDER_STATUS = status;
  } catch {}
}, 2500);
</script>
</body>
</html>
