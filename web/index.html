<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Golf clipper</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --line: #2a313c;
    --text: #e6edf3;
    --muted: #8b949e;
    --strong: #2ea043;
    --ok: #c9a227;
    --weak: #d1242f;
    --pending: #6e7681;
    --accent: #58a6ff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--text);
               font: 14px/1.4 -apple-system, system-ui, sans-serif; }
  header {
    position: sticky; top: 0; z-index: 10;
    background: var(--panel); border-bottom: 1px solid var(--line);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 16px;
  }
  header h1 { font-size: 14px; font-weight: 600; margin: 0; }
  header .meta { color: var(--muted); }
  header .filters { margin-left: auto; display: flex; gap: 6px; }
  .filter-btn {
    background: transparent; color: var(--muted);
    border: 1px solid var(--line); border-radius: 6px;
    padding: 4px 10px; cursor: pointer; font-size: 12px;
  }
  .filter-btn.active { background: var(--accent); color: #0e1116; border-color: var(--accent); }
  main { padding: 16px; }
  .grid {
    display: grid; gap: 12px;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  }
  .tile {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 8px; overflow: hidden;
    cursor: pointer; transition: transform 0.08s, border-color 0.08s;
    display: flex; flex-direction: column;
  }
  .tile:hover { border-color: var(--accent); transform: translateY(-1px); }
  .tile.flagged { border-color: var(--weak); }
  .tile.needs_fix { box-shadow: inset 0 0 0 3px var(--weak); }
  .tile.needs_fix::after {
    content: "✕"; position: absolute; top: 8px; right: 8px;
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--weak); color: #fff; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .tile.approved { opacity: 0.55; }
  .tile { position: relative; }
  .edit-btn, .trash-btn, .approve-btn, .fix-btn {
    background: rgba(22,27,34,0.85); color: var(--text);
    border: 1px solid var(--line); border-radius: 4px;
    width: 28px; height: 24px; padding: 0; cursor: pointer;
    font-size: 13px; line-height: 1;
  }
  .approve-btn:hover { background: var(--strong); color: #fff; border-color: var(--strong); }
  .fix-btn:hover { background: var(--weak); color: #fff; border-color: var(--weak); }
  .edit-btn:hover { background: var(--accent); color: #0e1116; }
  .trash-btn:hover { background: var(--weak); color: #fff; border-color: var(--weak); }
  .tile .slot { width: 100%; aspect-ratio: 16 / 9; background: #000; display: block; }
  .tile video, .tile .placeholder {
    width: 100%; height: 100%; background: #000; display: block;
    object-fit: cover;
  }
  .tile .placeholder {
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 12px;
  }
  .tile .meta {
    padding: 8px 10px;
    display: flex; align-items: center; gap: 8px;
    border-top: 1px solid var(--line);
  }
  .tile .name {
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-size: 12px; color: var(--muted);
  }
  .chip {
    font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .chip.strong  { background: rgba(46,160,67,0.15); color: var(--strong); }
  .chip.ok      { background: rgba(201,162,39,0.15); color: var(--ok); }
  .chip.weak    { background: rgba(209,36,47,0.15); color: var(--weak); }
  .chip.pending { background: rgba(110,118,129,0.15); color: var(--pending); }
  .chip.edited  { background: rgba(88,166,255,0.15); color: var(--accent); }
  .hole-badge {
    position: absolute; top: 8px; left: 8px;
    background: rgba(14,17,22,0.85); color: var(--text);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 4px; padding: 3px 8px;
    font-size: 11px; font-weight: 600;
    pointer-events: none;
  }
  .hole-badge .par { color: var(--accent); margin-left: 4px; }
  .flag-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--weak);
  }
  .empty { color: var(--muted); padding: 32px; text-align: center; }

  /* Finalise dialog */
  .modal-mask {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 50; display: none; align-items: center; justify-content: center;
  }
  .modal-mask.open { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    width: min(560px, 90vw); padding: 20px 24px;
  }
  .modal h2 { margin: 0 0 4px 0; font-size: 16px; }
  .modal .sub { color: var(--muted); font-size: 12px; margin-bottom: 16px; }
  .modal h3 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--muted); margin: 14px 0 8px;
  }
  .card-row {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 0; border-bottom: 1px solid var(--line);
  }
  .card-row:last-child { border-bottom: 0; }
  .card-row label { display: flex; align-items: center; gap: 8px; flex: 1; cursor: pointer; }
  .card-row .desc { color: var(--muted); font-size: 11px; }
  .card-row input[type=number] {
    width: 64px; background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 4px;
    padding: 4px 6px; font: inherit; text-align: right;
  }
  .card-row .unit { color: var(--muted); font-size: 11px; margin-left: -6px; }
  .modal .actions {
    display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px;
  }
  .modal .actions button {
    background: transparent; color: var(--text);
    border: 1px solid var(--line); border-radius: 6px;
    padding: 6px 14px; cursor: pointer; font: inherit;
  }
  .modal .actions button.primary {
    background: var(--accent); color: var(--bg); border-color: var(--accent);
    font-weight: 600;
  }
</style>
</head>
<body>
  <header>
    <h1>Golf clipper</h1>
    <span class="meta" id="round-meta">…</span>
    <div class="filters">
      <button class="filter-btn active" data-filter="active"
              title="Working queue: everything not yet approved (unreviewed + needs fix).">Active</button>
      <button class="filter-btn" data-filter="needs_fix"
              title="Only clips you've marked with ✕ for fixing. Subset of Active.">Needs fix</button>
      <button class="filter-btn" data-filter="approved"
              title="Clips you've signed off on. Hidden from Active.">Approved</button>
      <button class="filter-btn" data-filter="all"
              title="Every clip in the round, regardless of review state.">All</button>
      <button id="approve-all" class="filter-btn" style="background:var(--accent);color:#0e1116;border-color:var(--accent);font-weight:600;">Approve N unmarked</button>
      <button id="render-all" class="filter-btn"
              title="Rebuild every per-clip trim from its raw source — re-cuts the strike window and re-bakes the scorecard / hole-map overlay. Use this after changes to overlay.py or scorecard data. Doesn't touch the final video."
              style="background:var(--strong);color:#0e1116;border-color:var(--strong);font-weight:600;">Re-render all clips</button>
      <button id="finalise" class="filter-btn" style="background:var(--accent);color:#0e1116;border-color:var(--accent);font-weight:600;">Render final video</button>
      <a id="final-link" href="/final.mp4" class="filter-btn" style="display:none;background:transparent;color:var(--accent);border-color:var(--accent);text-decoration:none;">Open final.mp4</a>
    </div>
  </header>
  <main>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">No clips match.</div>
  </main>

  <div class="modal-mask" id="finalise-modal">
    <div class="modal">
      <h2>Render final video</h2>
      <div class="sub" id="finalise-sub">…</div>

      <h3>Start</h3>
      <div id="start-cards"></div>

      <h3>End</h3>
      <div id="end-cards"></div>

      <div class="actions">
        <button id="finalise-cancel">Cancel</button>
        <button id="finalise-go" class="primary">Render</button>
      </div>
    </div>
  </div>

<script>
const TILES = new Map();   // stem -> {el, slot, meta, sig}
let FILTER = "active";

// Pause off-screen videos to keep the UI smooth.
const visibility = new IntersectionObserver((entries) => {
  for (const e of entries) {
    const v = e.target.querySelector("video");
    if (!v) continue;
    if (e.isIntersecting) { v.play().catch(() => {}); }
    else                  { v.pause(); }
  }
}, { rootMargin: "200px" });

function sigOf(c) {
  return [
    c.confidence, c.flagged, c.edited, c.has_trim, c.review,
    c.hole, c.render_status,
  ].join("|");
}

async function setReview(stem, review) {
  await fetch(`/api/clips/${encodeURIComponent(stem)}/review`, {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ review }),
  });
  // Optimistic local update
  const c = LAST_CLIPS.find(x => x.stem === stem);
  if (c) { c.review = review; render(LAST_CLIPS); updateApproveButton(); }
}

function makeTile(c) {
  const tile = document.createElement("div");
  tile.dataset.stem = c.stem;
  tile.onclick = (e) => {
    if (e.target.closest(".edit-btn") || e.target.closest(".trash-btn")
        || e.target.closest(".approve-btn") || e.target.closest(".fix-btn")) return;
    const cur = (LAST_CLIPS.find(x => x.stem === c.stem) || c).review || "unreviewed";
    const next = cur === "needs_fix" ? "unreviewed" : "needs_fix";
    setReview(c.stem, next);
  };
  const slot = document.createElement("div"); slot.className = "slot";
  const meta = document.createElement("div"); meta.className = "meta";
  tile.appendChild(slot); tile.appendChild(meta);
  visibility.observe(tile);
  return { el: tile, slot, meta };
}

function fillTile(rec, c) {
  const review = c.review || "unreviewed";
  rec.el.className = "tile"
    + (c.flagged ? " flagged" : "")
    + (review === "needs_fix" ? " needs_fix" : "")
    + (review === "approved" ? " approved" : "");

  // Hole badge sits on top of the slot. Re-create per fillTile (cheap).
  const oldBadge = rec.el.querySelector(".hole-badge");
  if (oldBadge) oldBadge.remove();
  if (c.hole != null) {
    const badge = document.createElement("div");
    badge.className = "hole-badge";
    badge.innerHTML = `H${c.hole}<span class="par">P${c.par}</span>`;
    rec.el.appendChild(badge);
  }

  // Media slot — only (re)build when has_trim flips.
  const hasVideo = rec.slot.firstChild?.tagName === "VIDEO";
  if (c.has_trim && !hasVideo) {
    rec.slot.innerHTML = "";
    const v = document.createElement("video");
    v.src = `/trims/${encodeURIComponent(c.stem)}.mp4`;
    v.loop = true; v.muted = true; v.playsInline = true;
    v.preload = "metadata";
    rec.slot.appendChild(v);
    // Kick visibility check immediately (might already be on screen).
    if (rec.el.getBoundingClientRect().top < window.innerHeight + 200) {
      v.play().catch(() => {});
    }
  } else if (!c.has_trim && !hasVideo) {
    rec.slot.innerHTML = "";
    const ph = document.createElement("div");
    ph.className = "placeholder";
    ph.textContent = c.confidence === "pending" ? "processing…" : "no trim";
    rec.slot.appendChild(ph);
  }

  // Meta row — rebuild (cheap, no video).
  rec.meta.innerHTML = "";
  const name = document.createElement("div");
  name.className = "name"; name.textContent = c.stem;
  rec.meta.appendChild(name);
  if (c.edited) {
    const e = document.createElement("span");
    e.className = "chip edited"; e.textContent = "edited";
    rec.meta.appendChild(e);
  }
  const chip = document.createElement("span");
  chip.className = "chip " + (c.confidence || "pending");
  chip.textContent = c.confidence || "pending";
  rec.meta.appendChild(chip);
  if (c.flagged) {
    const dot = document.createElement("span");
    dot.className = "flag-dot"; dot.title = (c.reasons || []).join("; ");
    rec.meta.appendChild(dot);
  }
  if (review !== "approved") {
    const approveBtn = document.createElement("button");
    approveBtn.className = "approve-btn"; approveBtn.title = "Approve (removes from Active)";
    approveBtn.textContent = "✓";
    approveBtn.onclick = (e) => { e.stopPropagation(); setReview(c.stem, "approved"); };
    rec.meta.appendChild(approveBtn);
  }
  if (review !== "needs_fix") {
    const fixBtn = document.createElement("button");
    fixBtn.className = "fix-btn"; fixBtn.title = "Mark needs fix";
    fixBtn.textContent = "✕";
    fixBtn.onclick = (e) => { e.stopPropagation(); setReview(c.stem, "needs_fix"); };
    rec.meta.appendChild(fixBtn);
  }

  const editBtn = document.createElement("button");
  editBtn.className = "edit-btn"; editBtn.title = "Open compare view";
  editBtn.textContent = "✎";
  editBtn.onclick = (e) => {
    e.stopPropagation();
    location.href = `/clip/${encodeURIComponent(c.stem)}`;
  };
  rec.meta.appendChild(editBtn);

  const trashBtn = document.createElement("button");
  trashBtn.className = "trash-btn"; trashBtn.title = "Discard (move to trash/)";
  trashBtn.textContent = "🗑";
  trashBtn.onclick = async (e) => {
    e.stopPropagation();
    if (!confirm(`Discard ${c.stem}? Files move to clips/<round>/trash/.`)) return;
    await fetch(`/api/clips/${encodeURIComponent(c.stem)}/discard`, { method: "POST" });
    LAST_CLIPS = LAST_CLIPS.filter(x => x.stem !== c.stem);
    render(LAST_CLIPS); updateApproveButton();
  };
  rec.meta.appendChild(trashBtn);
}

function render(clips) {
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  const filtered = clips.filter(c => {
    const r = c.review || "unreviewed";
    if (FILTER === "active")    return r !== "approved";
    if (FILTER === "needs_fix") return r === "needs_fix";
    if (FILTER === "approved")  return r === "approved";
    return true;
  });
  empty.style.display = filtered.length ? "none" : "";

  const wantStems = new Set(filtered.map(c => c.stem));
  // Remove tiles no longer wanted.
  for (const [stem, rec] of TILES) {
    if (!wantStems.has(stem)) {
      visibility.unobserve(rec.el);
      rec.el.remove(); TILES.delete(stem);
    }
  }
  // Add or update tiles in order.
  let prev = null;
  for (const c of filtered) {
    let rec = TILES.get(c.stem);
    if (!rec) {
      rec = makeTile(c);
      TILES.set(c.stem, rec);
      grid.appendChild(rec.el);
    } else if (prev && prev.nextSibling !== rec.el) {
      grid.insertBefore(rec.el, prev.nextSibling);
    } else if (!prev && grid.firstChild !== rec.el) {
      grid.insertBefore(rec.el, grid.firstChild);
    }
    const sig = sigOf(c);
    if (rec.sig !== sig) { fillTile(rec, c); rec.sig = sig; }
    prev = rec.el;
  }
}

let LAST_CLIPS = [];

async function load() {
  const [round, clips] = await Promise.all([
    fetch("/api/round").then(r => r.json()),
    fetch("/api/clips").then(r => r.json()),
  ]);
  let label = `${round.round} — ${round.raw_count} clips`;
  if (round.has_scores) {
    label += `  •  ${round.course} (${(round.players || []).join(", ")})`;
  }
  document.getElementById("round-meta").textContent = label;
  LAST_CLIPS = clips;
  render(clips);
}

document.querySelectorAll(".filter-btn[data-filter]").forEach(b => {
  b.onclick = () => {
    document.querySelectorAll(".filter-btn[data-filter]").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    FILTER = b.dataset.filter;
    render(LAST_CLIPS);
  };
});

function updateApproveButton() {
  const btn = document.getElementById("approve-all");
  const n = LAST_CLIPS.filter(c => (c.review || "unreviewed") === "unreviewed").length;
  btn.textContent = `Approve ${n} unmarked`;
  btn.disabled = n === 0;
  btn.style.opacity = n === 0 ? 0.4 : 1;
}

document.getElementById("render-all").onclick = async () => {
  const n = LAST_CLIPS.length;
  if (!n) return;
  if (!confirm(`Re-render all ${n} clip(s)? This will rebuild every trim with the current scorecard overlay.`)) return;
  const r = await fetch("/api/render-all", { method: "POST" });
  if (!r.ok) {
    const txt = await r.text();
    alert(`Failed to queue: ${r.status} ${txt}`);
    return;
  }
  // Hop to the progress page so the user sees CPU / memory / per-clip
  // status in real time instead of a fire-and-forget alert.
  window.location.href = "/progress";
};

let FINAL_STATE = "idle";
async function refreshFinalStatus() {
  try {
    const s = await fetch("/api/finalise/status").then(r => r.json());
    FINAL_STATE = s.state;
    const btn = document.getElementById("finalise");
    const link = document.getElementById("final-link");
    // The output file exists during encoding too (ffmpeg -y opens it
    // immediately). Only treat it as ready when state confirms it.
    const ready = (s.state === "done" || s.state === "idle") && s.exists;
    if (s.state === "encoding") {
      // Live progress %, plus a hint that the button now opens the progress page.
      const pct = (s.percent != null) ? ` ${(s.percent * 100).toFixed(0)}%` : "";
      btn.textContent = `Encoding…${pct} · view progress`;
      btn.disabled = false; btn.style.opacity = 1;
      btn.title = "Open the live progress page";
    } else if (s.state === "error") {
      btn.textContent = "Render final video";
      btn.disabled = false; btn.style.opacity = 1;
      btn.title = "Last error: " + (s.message || "unknown");
    } else if (s.state === "cancelled") {
      btn.textContent = "Render final video";
      btn.disabled = false; btn.style.opacity = 1;
      btn.title = "Previous render cancelled";
    } else {
      btn.textContent = ready ? "Re-render final" : "Render final video";
      btn.disabled = false; btn.style.opacity = 1;
      btn.title = "";
    }
    link.style.display = ready ? "" : "none";
  } catch {}
}

// Card definitions — kept in sync with finalise.AVAILABLE_CARDS.
const CARD_DEFS = [
  { kind: "title",     label: "Title card",      desc: "Course, date, player names", default_seconds: 3 },
  { kind: "scorecard", label: "Full scorecard",  desc: "All 18 holes, par, strokes per player", default_seconds: 7 },
  { kind: "summary",   label: "Round summary",   desc: "Totals, vs par, putts, score breakdown", default_seconds: 6 },
];

function renderCardOptions(containerId, defaults) {
  const el = document.getElementById(containerId);
  el.innerHTML = "";
  for (const def of CARD_DEFS) {
    const initial = defaults.find(d => d.kind === def.kind);
    const row = document.createElement("div");
    row.className = "card-row";
    row.innerHTML = `
      <label>
        <input type="checkbox" data-kind="${def.kind}" ${initial ? "checked" : ""}>
        <span>${def.label}<div class="desc">${def.desc}</div></span>
      </label>
      <input type="number" min="0.5" max="60" step="0.5"
             data-sec="${def.kind}"
             value="${initial ? initial.seconds : def.default_seconds}">
      <span class="unit">s</span>`;
    el.appendChild(row);
  }
}

function collectCards(containerId) {
  const el = document.getElementById(containerId);
  const out = [];
  for (const cb of el.querySelectorAll("input[type=checkbox]")) {
    if (!cb.checked) continue;
    const kind = cb.dataset.kind;
    const sec = parseFloat(el.querySelector(`input[data-sec="${kind}"]`).value);
    out.push({ kind, seconds: sec });
  }
  return out;
}

function openFinaliseModal() {
  const approved = LAST_CLIPS.filter(c => (c.review || "unreviewed") === "approved").length;
  document.getElementById("finalise-sub").textContent =
    `${approved} approved clip${approved === 1 ? "" : "s"} will be concatenated chronologically.`;
  // Sensible defaults: title at start, scorecard at end.
  renderCardOptions("start-cards", [{ kind: "title", seconds: 3 }]);
  renderCardOptions("end-cards", [{ kind: "scorecard", seconds: 7 }]);
  document.getElementById("finalise-modal").classList.add("open");
}

function closeFinaliseModal() {
  document.getElementById("finalise-modal").classList.remove("open");
}

document.getElementById("finalise").onclick = () => {
  // While encoding, the button doubles as the link to the progress page.
  if (FINAL_STATE === "encoding") { location.href = "/progress"; return; }
  const approved = LAST_CLIPS.filter(c => (c.review || "unreviewed") === "approved").length;
  if (!approved) { alert("No approved clips to render."); return; }
  openFinaliseModal();
};

document.getElementById("finalise-cancel").onclick = closeFinaliseModal;
document.getElementById("finalise-modal").onclick = (e) => {
  if (e.target.id === "finalise-modal") closeFinaliseModal();
};

document.getElementById("finalise-go").onclick = async () => {
  const start = collectCards("start-cards");
  const end = collectCards("end-cards");
  closeFinaliseModal();
  const r = await fetch("/api/finalise", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ start, end }),
  });
  if (!r.ok) { alert("Failed to start: " + r.status + " " + await r.text()); return; }
  // Jump straight to the live progress page so the user can watch ffmpeg work.
  location.href = "/progress";
};

document.getElementById("approve-all").onclick = async () => {
  const n = LAST_CLIPS.filter(c => (c.review || "unreviewed") === "unreviewed").length;
  if (!n) return;
  if (!confirm(`Mark ${n} unmarked clip(s) as approved? They'll move out of Active view.`)) return;
  await fetch("/api/review/approve_unreviewed", { method: "POST" });
  const fresh = await fetch("/api/clips").then(r => r.json());
  LAST_CLIPS = fresh; render(fresh); updateApproveButton();
};

load().then(() => { updateApproveButton(); refreshFinalStatus(); });
setInterval(async () => {
  const fresh = await fetch("/api/clips").then(r => r.json());
  LAST_CLIPS = fresh;
  render(fresh);
  updateApproveButton();
  refreshFinalStatus();
}, 3000);
</script>
</body>
</html>
